name: build-play

# Builds the signed `play`-flavor APK (the Firebase/FCM variant) for our
# self-hosted ntfy server. The official repo has no such workflow — its CI builds
# the F-Droid flavor, which has no Firebase. This one injects our own
# google-services.json + signing keystore from repo secrets at build time so
# neither ever lands in git.
#
# Required repository secrets (Settings -> Secrets and variables -> Actions):
#   GOOGLE_SERVICES_JSON  base64 of app/google-services.json   (com.pmou.ntfy)
#   KEYSTORE_BASE64       base64 of the release keystore (.jks)
#   KEYSTORE_PASSWORD     keystore password
#   KEY_ALIAS             key alias
#   KEY_PASSWORD          key password
#
# The APK is uploaded as a build artifact; download it from the run page and
# `adb install` (or open on the phone). Tag-triggered runs also attach it to a
# GitHub Release for easy phone download.

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Decode google-services.json
        env:
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
        run: echo "$GOOGLE_SERVICES_JSON" | base64 -d > app/google-services.json

      - name: Decode signing keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: echo "$KEYSTORE_BASE64" | base64 -d > "$RUNNER_TEMP/release.jks"

      - name: Build playRelease APK
        env:
          KEYSTORE_FILE: ${{ runner.temp }}/release.jks
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: ./gradlew assemblePlayRelease --no-daemon

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: ntfy-play-release
          path: app/build/outputs/apk/play/release/*.apk
          if-no-files-found: error

      - name: Attach APK to release (tags only)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: app/build/outputs/apk/play/release/*.apk
